  </noscript>
  <style>
    /* 
       PREMIUM LOADER v4.3 - ABSOLUTE PARITY 
       Matches PremiumLoader.tsx [0.1, 1, 0.1] linear cycle.
    */
    @keyframes dot-pulse {
      0% { opacity: 0.1; }
      50% { opacity: 1; }
      100% { opacity: 0.1; }
    }

    .loader-container {
      position: fixed;
      inset: 0;
      background-color: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loader-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 4px;
    }

    .loader-dot {
      width: 4px;
      height: 4px;
      background-color: #ffffff;
      opacity: 0.1;
      animation: dot-pulse 1.5s linear infinite;
    }

    /* 
       SNAKE DELAY MAPPING (Matching PremiumLoader.tsx)
       Sequence: [0, 1, 2, 3, 7, 11, 15, 14, 13, 12, 8, 4, 5, 6, 10, 9]
       Step Delay: 0.08s
    */
    .dot-0 { animation-delay: 0.00s; }
    .dot-1 { animation-delay: 0.08s; }
    .dot-2 { animation-delay: 0.16s; }
    .dot-3 { animation-delay: 0.24s; }
    .dot-4 { animation-delay: 0.88s; }
    .dot-5 { animation-delay: 0.96s; }
    .dot-6 { animation-delay: 1.04s; }
    .dot-7 { animation-delay: 0.32s; }
    .dot-8 { animation-delay: 0.80s; }
    .dot-9 { animation-delay: 1.20s; }
    .dot-10 { animation-delay: 1.12s; }
    .dot-11 { animation-delay: 0.40s; }
    .dot-12 { animation-delay: 0.72s; }
    .dot-13 { animation-delay: 0.64s; }
    .dot-14 { animation-delay: 0.56s; }
    .dot-15 { animation-delay: 0.48s; }
  </style>
</head>
