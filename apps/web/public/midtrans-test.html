<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamuu - Midtrans Sandbox Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #0A1128; margin-bottom: 10px; }
        .info {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
        }
        .info code {
            background: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        button {
            background: #FFBF00;
            color: #0A1128;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        button:hover {
            background: #ffb700;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        #result.success { background: #d4edda; color: #155724; }
        #result.error { background: #f8d7da; color: #721c24; }
        #result.info { background: #d1ecf1; color: #0c5460; }
        .log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-line { margin: 5px 0; }
        .log-info { color: #6a9955; }
        .log-error { color: #f48771; }
        .log-warn { color: #dcdcaa; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧪 Midtrans Sandbox Test</h1>
        <p style="color: #666;">Tamuu Payment Gateway Integration</p>
        
        <div class="info">
            <strong>Configuration:</strong><br>
            Client Key: <code id="clientKey">Loading...</code><br>
            Environment: <code id="env">SANDBOX</code>
        </div>

        <button id="payButton" onclick="testPayment()">
            💳 Test Payment (Pro - Rp 99.000)
        </button>

        <div id="result"></div>

        <div class="log" id="log"></div>
    </div>

    <script>
        // Configuration
        const CLIENT_KEY = 'Mid-client-aVS390dhMuLvPXMa';
        const API_BASE = 'https://api.tamuu.id';
        const IS_PRODUCTION = false;

        // Display config
        document.getElementById('clientKey').textContent = CLIENT_KEY;
        document.getElementById('env').textContent = IS_PRODUCTION ? 'PRODUCTION' : 'SANDBOX';

        // Logger
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        // Load Snap.js
        async function loadSnap() {
            if (window.snap) {
                log('Snap.js already loaded', 'info');
                return true;
            }

            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = IS_PRODUCTION
                    ? 'https://app.midtrans.com/snap/snap.js'
                    : 'https://app.sandbox.midtrans.com/snap/snap.js';
                script.setAttribute('data-client-key', CLIENT_KEY);
                script.crossOrigin = 'anonymous';
                
                script.onload = () => {
                    log('✅ Snap.js loaded successfully from: ' + script.src, 'info');
                    resolve(true);
                };
                
                script.onerror = (err) => {
                    log('❌ Failed to load Snap.js: ' + err, 'error');
                    reject(err);
                };
                
                document.body.appendChild(script);
                log('📥 Loading Snap.js from: ' + script.src, 'info');
            });
        }

        // Test Payment
        async function testPayment() {
            const button = document.getElementById('payButton');
            const resultDiv = document.getElementById('result');
            
            button.disabled = true;
            button.textContent = '⏳ Processing...';
            resultDiv.style.display = 'none';

            try {
                // Step 1: Load Snap
                await loadSnap();

                // Step 2: Get token from API
                log('🔑 Requesting Snap token from API...', 'info');
                
                // Use test user data
                const testData = {
                    userId: 'test-user-001',
                    tier: 'pro',
                    amount: 99000,
                    email: 'test@tamuu.id',
                    name: 'Test User'
                };

                const response = await fetch(`${API_BASE}/api/billing/midtrans/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });

                log(`📡 API Response Status: ${response.status} ${response.statusText}`, response.ok ? 'info' : 'error');

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || errorData.details || 'API Error');
                }

                const data = await response.json();
                log('✅ Token received: ' + (data.token ? data.token.substring(0, 20) + '...' : 'NO TOKEN'), 'info');
                
                if (!data.token) {
                    throw new Error(data.error || 'No token in response');
                }

                // Step 3: Launch Snap
                log('🚀 Launching Snap payment popup...', 'info');
                
                window.snap.pay(data.token, {
                    onSuccess: (result) => {
                        log('✅ Payment Success: ' + JSON.stringify(result), 'success');
                        showResult('success', 'Payment Success! Check logs below.');
                        button.disabled = false;
                        button.textContent = '💳 Test Payment (Pro - Rp 99.000)';
                    },
                    onPending: (result) => {
                        log('⏳ Payment Pending: ' + JSON.stringify(result), 'warn');
                        showResult('info', 'Payment Pending. Check logs below.');
                        button.disabled = false;
                        button.textContent = '💳 Test Payment (Pro - Rp 99.000)';
                    },
                    onError: (result) => {
                        log('❌ Payment Error: ' + JSON.stringify(result), 'error');
                        showResult('error', 'Payment Error. Check logs below.');
                        button.disabled = false;
                        button.textContent = '💳 Test Payment (Pro - Rp 99.000)';
                    },
                    onClose: () => {
                        log('🚪 Payment popup closed by user', 'warn');
                        button.disabled = false;
                        button.textContent = '💳 Test Payment (Pro - Rp 99.000)';
                    }
                });

            } catch (error) {
                log('❌ Error: ' + error.message, 'error');
                showResult('error', 'Error: ' + error.message);
                button.disabled = false;
                button.textContent = '💳 Test Payment (Pro - Rp 99.000)';
            }
        }

        function showResult(type, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = type;
            resultDiv.textContent = message;
            resultDiv.style.display = 'block';
        }

        // Initial log
        log('🧪 Midtrans Sandbox Test initialized', 'info');
        log('📋 Client Key: ' + CLIENT_KEY, 'info');
        log('🌐 API Base: ' + API_BASE, 'info');
    </script>
</body>
</html>
